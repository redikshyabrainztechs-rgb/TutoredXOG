info:
  name: Create 1-on-1 session
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseURL}}/instructor/1on1/create"
  body:
    type: json
    data: |-
      {
        "title": "English Conversation Practice",
        "description": "One-on-one English speaking sessions focused on fluency, pronunciation, and confidence building",
        "default_session_length": 90,
        "pricing": 25,
        "currency": "NPR",
        "free_first_lesson": true,
        "cancellation_policy": 24,
        "max_session_per_day": 5,
        "allow_rescheduling": true,
        "rescheduling": 12,
        "minimum_notice": 6,
        "availability_request": {
          "timezone": "Asia/Kathmandu",
          "availability": [
            {
              "type": "Tuesday",
              "available_time": [
                {
                  "from": "09:00",
                  "to": "12:00"
                },
                {
                  "from": "14:00",
                  "to": "18:00"
                }
              ]
            },
            {
              "type": "Wednesday",
              "available_time": [
                {
                  "from": "10:00",
                  "to": "16:00"
                }
              ]
            },
            {
              "type": "Friday",
              "available_time": [
                {
                  "from": "09:00",
                  "to": "13:00"
                }
              ]
            }
          ]
        }
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
